name: Terraform CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  terraform:
    name: fmt / validate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Run checks against every stage independently
        module: [bootstrap, network, compute-k3s, alb]
    defaults:
      run:
        working-directory: terraform/${{ matrix.module }}

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"

      - name: terraform fmt
        run: terraform fmt -check -diff -recursive

      - name: terraform init (no backend)
        run: terraform init -backend=false -input=false

      - name: terraform validate
        run: terraform validate

  manifests:
    name: validate k8s manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: install kubeconform
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz \
            | tar xz -C /usr/local/bin

      - name: validate GitOps manifests
        run: |
          find terraform/cloud-gitops -name '*.yaml' | xargs kubeconform \
            -strict \
            -ignore-missing-schemas \
            -kubernetes-version 1.29.0 \
            -summary